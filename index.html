<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Quiz App</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Added a beautiful gradient background -->
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center min-h-screen p-4 font-sans text-gray-800">

  <!-- Added shadow-2xl, rounded-2xl, and slight glass effect (bg-white/95 backdrop-blur) -->
  <div id="app" class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-6 md:p-8 transition-all duration-500">
    
    <!-- Start Screen -->
    <div id="start-screen" class="text-center">
      <!-- Added a gradient text effect to the title -->
      <h1 class="text-4xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-500 drop-shadow-sm">Trivia Master 420</h1>

      <div class="space-y-4 mb-6">
        <div class="text-left">
          <label class="block mb-1 text-sm font-bold text-gray-600 uppercase tracking-wide">Category</label>
          <select id="category-select" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all cursor-pointer">
            <option value="">Any Category</option>
            <option value="9">General Knowledge</option>
            <option value="17">Science & Nature</option>
            <option value="23">History</option>
            <option value="18">Computers</option>
            <option value="21">Sports</option>
            <option value="12">Music</option>
          </select>
        </div>

        <div class="text-left">
          <label class="block mb-1 text-sm font-bold text-gray-600 uppercase tracking-wide">Difficulty</label>
          <select id="difficulty-select" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all cursor-pointer">
            <option value="">Any Difficulty</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div class="text-left">
          <label class="block mb-1 text-sm font-bold text-gray-600 uppercase tracking-wide">Questions (1-20)</label>
          <input type="number" id="num-questions" value="5" min="1" max="20" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all text-center font-bold text-lg">
        </div>
      </div>

      <!-- Button Hover Animation: hover:-translate-y-1 makes it lift up slightly -->
      <button id="start-btn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold text-lg px-4 py-4 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
        Start Quiz
      </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      
      <!-- NEW: Progress Bar Container -->
      <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
        <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-pink-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
      </div>

      <div class="flex justify-between items-center mb-6 border-b pb-4">
        <p id="question-count" class="text-sm font-bold text-gray-500 uppercase tracking-wide"></p>
        <div class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg font-bold">
          <p id="current-score">Score: 0</p>
        </div>
      </div>
      
      <h2 id="question-text" class="text-xl font-bold mb-6 text-gray-800 leading-snug"></h2>
      
      <div id="answers" class="space-y-3 mb-6"></div>
      
      <div class="min-h-[3rem] flex items-center justify-center">
        <p id="feedback" class="font-bold text-center text-xl"></p>
      </div>
      
      <button id="next-btn" class="hidden w-full mt-2 bg-gray-900 text-white font-bold text-lg px-4 py-4 rounded-xl shadow-md hover:bg-black hover:shadow-lg hover:-translate-y-1 transition-all duration-300">
      Next Question
      </button>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden text-center py-8">
      <div class="text-6xl mb-4">🏆</div>
      <h2 class="text-3xl font-extrabold mb-2 text-gray-800">Quiz Complete!</h2>
      <p id="final-score" class="text-2xl font-bold text-indigo-600 mb-8"></p>
      <button id="restart-btn" class="w-full bg-gradient-to-r from-green-400 to-emerald-600 text-white font-bold text-lg px-4 py-4 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
        Play Again
      </button>
    </div>
<!-- Add this anywhere in HTML temporarily -->
<div class="font-bold shadow-lg px-4 py-4 rounded-xl w-full text-lg transition-all duration-300 hover:-translate-y-1"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
